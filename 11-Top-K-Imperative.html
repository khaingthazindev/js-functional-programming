<html>
  <script>
    let nums = [1, 1, 1, 1, 2, 2, 3, 3, 3];
    //  Output [1, 3]
    /*
	 Requirement
	 find frequency of nums
	 sort nums based on frequency
	 extract top k
	 */
    let k = 2;
    let group = {};
    for (const num of nums) {
      if (!group[num]) {
        group[num] = 1;
      } else {
        group[num]++;
      }
    }
    console.log("group ", group);
    let groupAry = Object.entries(group); //change object to array
    console.log("groupAry ", groupAry);

    let sortGroup = groupAry.sort((a, b) => b[1] - a[1]);
    console.log("sortGroup ", sortGroup);

    let topsOrder = sortGroup.map((num) => num[0]);
    console.log("topsOrder ", topsOrder);
    console.log("top k frequence ", topsOrder.slice(0, k));
  </script>
</html>
