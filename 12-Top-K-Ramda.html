    let log = R.tap(console.log);

    //  Refector code
    let getTopK = R.pipe(
      R.countBy(R.identity),
      log,
      R.toPairs,
      log,
      R.sort((a, b) => b[1] - a[1]),
      log,
      R.map((item) => item[0]),
      log,
      R.take(k),
      log,
    );
    console.log("top k frequence ", getTopK(nums));
