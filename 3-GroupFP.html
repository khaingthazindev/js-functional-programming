    //  reuseable code with function
    function groupBy(arr, key) {
      let group = arr.reduce((group, item) => {
        let property = item[key];
        if (!group[property]) {
          return {
            ...group,
            [property]: [item],
          };
        } else {
          return {
            ...group,
            [property]: [...group[property], item],
          };
        }
      }, {});
      return group;
    }
