<html>
  <script>
    // Memoizing means cache
    // why we can cache because 'pure function' is 'same input same output'
    function factorial(n) {
      console.log(`${n} factorial was calculated.`);

      let result = 1;
      // 3! = 3*2*1;
      for (let i = 1; i <= n; i++) {
        result *= n;
      }
      return result;
    }

    function cache(fn) {
      return function (x) {
        if (!fn[x]) {
          fn[x] = fn(x);
        }
        return fn[x];
      };
    }

    let factorialCache = cache(factorial);
    console.log("factorial 3 ", factorialCache(3));
    console.log("factorial 3 ", factorialCache(3));
    console.log("factorial 3 ", factorialCache(3));

    console.log("factorial 4 ", factorialCache(4));
    console.log("factorial 4 ", factorialCache(4));
    console.log("factorial 4 ", factorialCache(4));
  </script>
</html>
