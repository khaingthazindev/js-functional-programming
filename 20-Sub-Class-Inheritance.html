<html>
  <script>
    class Human {
      constructor(name, age) {
        this.name = name;
        this.age = age;
        console.log("Human constructor");
      }
      display() {
        console.log("name ", this.name, " age ", this.age);
      }
    }

    class Teacher extends Human {
      subject;
      constructor(name, age, subject) {
        super(name, age);
        this.subject = subject;
        console.log("Teacher constructor");
      }
      display() {
        super.display(); // call parent's method
        console.log(
          "name ",
          this.name,
          " age ",
          this.age,
          " subject ",
          this.subject,
        );
      }
    }

    let teacherObj = new Teacher("KTZ", 31, "Myanmar");
    teacherObj.display();
  </script>
</html>
