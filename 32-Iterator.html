    for (const item of arr) {
      console.log(item);
    }

    console.log("next ", iterator.next());
    console.log("next ", iterator.next());
    console.log("next ", iterator.next());
    console.log("next ", iterator.next());

    for (const item of set) {
      console.log("set item ", item);
    }
  </script>
