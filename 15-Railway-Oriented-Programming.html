    /*
          Problem
          csv => apple = 2; orange: 3; bananna: 4
      parse => ['apple', 2], ['orange', 3], ['bananna', 4] if OK total = 7
      if NOT OK parseError
      */

    let csvStr = "apple=2;orange=13;banana=4";
    function parse(csvStr) {
      // normal value -> container "called Monadic Function"
      if (csvStr === null || csvStr === undefined || csvStr === "") {
        /*
      Imperative
          throw new Error("Invalid string");
      */
        // ROR
        return Left.of("Invalid string");
      } else {
        let items = csvStr.split(";");
        let arr = [];
        for (const item of items) {
          let [key, value] = item.split("=");
          arr.push({ key, value: parseInt(value) });
        }
        /*
      Imperative
          return arr;
      */
        // ROR
        return Right.of(arr);
      }
    }
    function maxItem(arr) {
      if (arr.length === 0) {
        return Left.of("Empty array");
      } else {
        let result = arr.reduce(
          (a, b) => {
            let maxItem = a.value > b.value ? a : b;
            return maxItem;
          },
          {
            key: "Dummy",
            value: Number.MIN_VALUE,
          },
        );
        //   console.log("max item ", result);

        return Right.of(result);
      }
    }
