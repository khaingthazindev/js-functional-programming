<html>
  <script>
    class Circle {
      constructor(radius) {
        this.radius = radius;
      }
      // computed property with getter
      get area() {
        return Math.PI * this.radius * this.radius;
      }
    }
    let c1 = new Circle(10);
    console.log("area ", c1.area);
  </script>
</html>
