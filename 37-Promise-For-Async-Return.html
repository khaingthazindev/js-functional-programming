  <script>
    // problem is div -> multi -> console
    //  div(10, 2) -> result,  multi(result, 3)), sub(result - 2)
    function div(a, b) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (isNaN(a) || isNaN(b)) {
            reject("a or b is NaN");
          } else {
            resolve(a / b);
          }
        }, 3000);
      });
    }

    function multi(a, b) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (isNaN(a) || isNaN(b)) {
            reject("a or b is NaN");
          } else {
            resolve(a * b);
          }
        }, 3000);
      });
    }

    div(10, 2)
      .then(
        (result) => multi(result, 3),
        (error) => console.log(error),
      )
      .then((multiResult) => console.log("multi result ", multiResult));
