<html>
  <script>
    // problem is div -> multi -> console
    //  div(10, 2) -> result,  multi(result, 3)), sub(result - 2)
    function div(a, b, callback) {
      setTimeout(() => {
        console.log("computed");
        callback(a / b);
        console.log("done");
      }, 3000);
    }

    function multi(a, b, callback) {
      setTimeout(() => {
        console.log("computed");
        callback(a * b);
        console.log("done");
      }, 3000);
    }

    function sub(a, b, callback) {
      setTimeout(() => {
        console.log("computed");
        callback(a - b);
        console.log("done");
      }, 3000);
    }

    function callback(data) {
      console.log("data ", data);
    }

    //  Callback hello 'hard to trace, hard to maintain'
    div(10, 2, (result) => {
      console.log("10/2 = ", result);
      multi(result, 3, (result2) => {
        console.log(`${result} * 3 = `, result2);
        sub(result2, 2, (result3) => {
          console.log(`${result2} - 2 = `, result3);
        });
      });
    });
  </script>
</html>
